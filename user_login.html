<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Sentix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #818cf8;
            --success: #34d399;
            --dark: #0f172a;
            --light: #1e2937;
            --gray: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animation des particules */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(129, 140, 248, 0.15);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            margin: 20px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Carte de connexion */
        .login-card {
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Icône */
        .user-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .user-icon i {
            font-size: 2.5rem;
            color: white;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 12px;
            font-size: 1rem;
            color: #e2e8f0;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
        }

        /* Bouton */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(129, 140, 248, 0.3);
        }

        /* Message d'erreur */
        .error-message {
            background: #7f1d1d;
            border-left: 4px solid #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #fda4af;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Liens */
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            color: #94a3b8;
        }

        .register-link, .back-link {
            color: #818cf8;
            text-decoration: none;
        }

        .register-link:hover, .back-link:hover {
            color: #c4d0ff;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
   
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="user-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="logo">Sentix</div>
                <div class="login-title">Espace Personnel</div>
                <div class="login-subtitle">Connectez-vous à votre compte</div>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" class="form-control" placeholder="Entrez votre nom d'utilisateur" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>

            <div class="links">
                <a href="/register" class="register-link">
                    <i class="fas fa-user-plus"></i> Pas encore inscrit ? Créer un compte
                </a><br>
                <a href="/" class="back-link">
                    <i class="fas fa-arrow-left"></i> Retour à l'accueil
                </a>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-chart-line"></i> Analysez vos sentiments avec l'IA
        </div>
    </div>

    <script>
        // Génération des particules
        for(let i = 0; i < 50; i++) {
            let particle = document.createElement('div');
            particle.classList.add('particle');
            let size = Math.random() * 10 + 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 20 + 10 + 's';
            document.getElementById('particles').appendChild(particle);
        }

        // Gestion du "Se souvenir de moi"
        if(localStorage.getItem('rememberedUser')) {
            document.querySelector('input[name="username"]').value = localStorage.getItem('rememberedUser');
            document.getElementById('remember').checked = true;
        }

        document.getElementById('remember').addEventListener('change', function(e) {
            if(e.target.checked) {
                const username = document.querySelector('input[name="username"]').value;
                localStorage.setItem('rememberedUser', username);
            } else {
                localStorage.removeItem('rememberedUser');
            }
        });
    </script>
</body>
</html>
