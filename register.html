<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Sentix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #818cf8;
            --success: #34d399;
            --dark: #0f172a;
            --light: #1e2937;
            --gray: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            background: #334155;
            border: 2px solid #475569;
            color: #e2e8f0;
            padding: 14px 20px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
        }

        .btn-register {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .error-message {
            background: #7f1d1d;
            color: #fda4af;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: var(--gray);
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div style="text-align:center; margin-bottom:30px;">
            <div class="logo">Sentix</div>
            <h2>Créer un compte</h2>
            <p style="color: var(--gray);">Rejoignez-nous pour analyser vos avis</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autocomplete="off">
            </div>

            <div class="form-group">
                <input type="password" name="password" id="password" class="form-control" placeholder="Mot de passe" required>
            </div>

            <div class="form-group">
                <input type="password" name="confirm_password" id="confirmPassword" class="form-control" placeholder="Confirmer le mot de passe" required>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> S'inscrire
            </button>
        </form>

        <div class="links">
            <p>Déjà un compte ? <a href="/user_login">Se connecter</a></p>
            <p><a href="/">← Retour à l'accueil</a></p>
        </div>
    </div>

    <script>
        // Validation mot de passe
        document.querySelector('form').addEventListener('submit', function(e) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (pass !== confirm) {
                e.preventDefault();
                alert('Les mots de passe ne correspondent pas !');
            }
        });
    </script>
</body>
</html>
